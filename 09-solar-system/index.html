<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System Simulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }

    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      padding: 16px;
      border-radius: 8px;
      color: white;
      font-family: sans-serif;
      font-size: 14px;
      z-index: 1;
      min-width: 240px;
    }

    .control-title {
      margin-bottom: 12px;
      font-weight: bold;
      font-size: 18px;
    }

    .slider-group {
      margin-bottom: 12px;
    }

    .slider-group label {
      display: block;
      margin-bottom: 4px;
    }

    input[type="range"] {
      width: 100%;
    }

    .button-group {
      margin-bottom: 12px;
    }

    button {
      padding: 8px 16px;
      margin: 4px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      background: #333;
      color: white;
    }

    button:hover {
      background: #444;
    }

    button.active {
      background: #3498db;
    }

    .info {
      margin-top: 16px;
      font-size: 12px;
      color: #aaa;
      border-top: 1px solid #444;
      padding-top: 12px;
    }

    .planet-info {
      margin-top: 8px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .planet-info h4 {
      margin-bottom: 4px;
      color: #3498db;
    }

    #focusButtons button {
      display: block;
      width: 100%;
      margin: 4px 0;
      text-align: left;
    }

    /* Celestial body labels */
    #labels-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .body-label {
      position: absolute;
      pointer-events: auto;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .body-label .label-outline {
      position: absolute;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-sizing: border-box;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .body-label.selected .label-outline {
      opacity: 1;
      border-color: #3498db;
    }

    .body-label .label-name {
      position: absolute;
      color: white;
      font-family: sans-serif;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.8), 0 0 8px rgba(0, 0, 0, 0.5);
    }

    .body-label:hover .label-name {
      color: #3498db;
    }

    .body-label.selected .label-name {
      color: #3498db;
    }

    /* Detail panel */
    #detail-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 320px;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      border-left: 1px solid rgba(255, 255, 255, 0.2);
      transform: translateX(100%);
      transition: transform 0.3s ease-out;
      z-index: 2;
      overflow-y: auto;
      font-family: sans-serif;
      color: white;
    }

    #detail-panel.open {
      transform: translateX(0);
    }

    #detail-panel .panel-header {
      position: relative;
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    #detail-panel .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
    }

    #detail-panel .close-btn:hover {
      color: #3498db;
    }

    #detail-panel .panel-title {
      font-size: 24px;
      font-weight: bold;
      margin: 0 0 4px 0;
      color: #3498db;
    }

    #detail-panel .panel-subtitle {
      font-size: 14px;
      color: #888;
      margin: 0;
    }

    #detail-panel .panel-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    #detail-panel .panel-content {
      padding: 20px;
    }

    #detail-panel .panel-section {
      margin-bottom: 20px;
    }

    #detail-panel .panel-section h4 {
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
      margin: 0 0 8px 0;
      letter-spacing: 1px;
    }

    #detail-panel .panel-section p {
      font-size: 14px;
      line-height: 1.6;
      margin: 0;
      color: #ccc;
    }

    #detail-panel .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    #detail-panel .stat-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 6px;
    }

    #detail-panel .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 4px;
    }

    #detail-panel .stat-value {
      font-size: 16px;
      font-weight: bold;
      color: white;
    }
  </style>
</head>
<body>
  <div id="controls">
    <div class="control-title">Solar System</div>

    <div class="slider-group">
      <label>Simulation Speed: <span id="speedValue">1.0</span>x</label>
      <input type="range" id="speedSlider" min="0" max="10" step="0.1" value="1.0">
    </div>

    <div class="button-group">
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="slider-group">
      <label>View Scale: <span id="scaleValue">1.0</span>x</label>
      <input type="range" id="scaleSlider" min="0.1" max="3" step="0.1" value="1.0">
    </div>

    <div class="button-group" id="focusButtons">
      <label style="margin-bottom: 8px;">Focus on:</label>
      <button data-target="sun" class="active">Sun</button>
      <button data-target="earth">Earth</button>
      <button data-target="moon">Moon</button>
      <button data-target="mars">Mars</button>
      <button data-target="free">Free Camera</button>
    </div>

    <div class="info">
      <div>Drag to orbit &bull; Scroll to zoom</div>
      <div class="planet-info" id="planetInfo">
        <h4>Sun</h4>
        <div id="infoContent">Center of the solar system</div>
      </div>
    </div>
  </div>

  <div id="labels-container"></div>

  <div id="detail-panel">
    <div class="panel-header">
      <button class="close-btn">&times;</button>
      <h2 class="panel-title">Sun</h2>
      <p class="panel-subtitle">Star</p>
    </div>
    <img class="panel-image" src="" alt="">
    <div class="panel-content">
      <div class="panel-section">
        <h4>Overview</h4>
        <p id="panel-description"></p>
      </div>
      <div class="panel-section">
        <h4>Statistics</h4>
        <div class="stats-grid" id="panel-stats"></div>
      </div>
      <div class="panel-section">
        <h4>Fun Facts</h4>
        <p id="panel-facts"></p>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
