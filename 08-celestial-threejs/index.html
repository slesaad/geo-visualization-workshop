<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celestial Bodies - Three.js</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }

    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      padding: 16px;
      border-radius: 8px;
      color: white;
      font-family: sans-serif;
      font-size: 14px;
      z-index: 1;
      min-width: 220px;
    }

    .control-title {
      margin-bottom: 12px;
      font-weight: bold;
      font-size: 16px;
    }

    .button-group {
      margin-bottom: 12px;
    }

    button {
      padding: 8px 16px;
      margin: 4px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      background: #333;
      color: white;
    }

    button:hover {
      background: #444;
    }

    button.active {
      background: #3498db;
    }

    .slider-group {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #444;
    }

    .slider-group label {
      display: block;
      margin-bottom: 4px;
    }

    input[type="range"] {
      width: 100%;
    }

    .info {
      margin-top: 16px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div id="controls">
    <div class="control-title">Celestial Bodies</div>

    <div class="button-group" id="bodyButtons">
      <button class="active" data-body="moon">Moon</button>
      <button data-body="earth">Earth</button>
      <button data-body="mars">Mars</button>
      <button data-body="sun">Sun</button>
    </div>

    <div class="button-group">
      <button id="rotationToggle" class="active">Stop Rotation</button>
    </div>

    <div class="slider-group">
      <div style="margin-bottom: 8px; font-weight: bold;">Lighting</div>
      <label>Sun Angle: <span id="lightAngleValue">45</span>&deg;</label>
      <input type="range" id="lightAngle" min="0" max="360" step="1" value="45">
      <div style="margin-top: 8px;">
        <label>Point Light Angle: <span id="pointLightAngleValue">45</span>&deg;</label>
        <input type="range" id="pointLightAngle" min="0" max="360" step="1" value="45">
      </div>
    </div>

    <div class="slider-group" id="displacementControls">
      <div style="margin-bottom: 8px; font-weight: bold;">Bump Map</div>

      <label>
        <input type="checkbox" id="enableDisplacement" checked>
        Enable bump map
      </label>

      <div id="scaleControl">
        <label>Scale: <span id="scaleValue">1.0</span></label>
        <input type="range" id="displacementScale" min="0" max="5" step="0.1" value="1.0">
      </div>
    </div>

    <div class="info">
      Drag to orbit &bull; Scroll to zoom
      <div id="textureInfo" style="margin-top: 4px;">
        Using NASA CGI Moon Kit textures
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
