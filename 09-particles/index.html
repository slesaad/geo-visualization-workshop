<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPU Particle Advection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }

    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      padding: 16px;
      border-radius: 8px;
      color: white;
      font-family: sans-serif;
      font-size: 14px;
      z-index: 1;
      min-width: 260px;
    }

    .control-title {
      margin-bottom: 12px;
      font-weight: bold;
      font-size: 18px;
    }

    .slider-group {
      margin-bottom: 12px;
    }

    .slider-group label {
      display: block;
      margin-bottom: 4px;
    }

    input[type="range"] {
      width: 100%;
    }

    .button-group {
      margin-bottom: 12px;
    }

    button {
      padding: 8px 16px;
      margin: 4px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      background: #333;
      color: white;
    }

    button:hover {
      background: #444;
    }

    button.active {
      background: #3498db;
    }

    .info {
      margin-top: 16px;
      font-size: 12px;
      color: #aaa;
      border-top: 1px solid #444;
      padding-top: 12px;
    }

    .stats {
      margin-top: 8px;
      font-family: monospace;
      font-size: 11px;
    }

    select {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: none;
      background: #333;
      color: white;
      font-size: 14px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="controls">
    <div class="control-title">GPU Particle Advection</div>

    <div class="slider-group">
      <label>Velocity Field:</label>
      <select id="fieldSelect">
        <option value="curl">Curl Noise</option>
        <option value="radial">Radial Flow</option>
        <option value="vortex">Vortex</option>
        <option value="wind">Wind Pattern</option>
      </select>
    </div>

    <div class="slider-group">
      <label>Particle Count: <span id="countValue">65536</span></label>
      <input type="range" id="countSlider" min="12" max="18" step="1" value="16">
    </div>

    <div class="slider-group">
      <label>Speed: <span id="speedValue">1.0</span>x</label>
      <input type="range" id="speedSlider" min="0.1" max="3" step="0.1" value="1.0">
    </div>

    <div class="slider-group">
      <label>Trail Length: <span id="trailValue">0.95</span></label>
      <input type="range" id="trailSlider" min="0.8" max="0.99" step="0.01" value="0.95">
    </div>

    <div class="slider-group">
      <label>Particle Size: <span id="sizeValue">2.0</span></label>
      <input type="range" id="sizeSlider" min="0.5" max="5" step="0.5" value="2.0">
    </div>

    <div class="button-group">
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="slider-group">
      <label>Color Mode:</label>
      <select id="colorSelect">
        <option value="velocity">Velocity Magnitude</option>
        <option value="direction">Flow Direction</option>
        <option value="age">Particle Age</option>
        <option value="white">White</option>
      </select>
    </div>

    <div class="info">
      <div>Particles simulated entirely on GPU</div>
      <div>Using framebuffer ping-pong technique</div>
      <div class="stats" id="stats">
        FPS: 60 | Particles: 65536
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
