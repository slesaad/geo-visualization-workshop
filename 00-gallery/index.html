<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualization Workshop Gallery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: white;
    }

    header {
      text-align: center;
      padding: 60px 20px 40px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    h1 span {
      color: #3498db;
      font-weight: 600;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 1.1rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 30px;
      padding: 50px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: #3498db;
      box-shadow: 0 20px 40px rgba(52, 152, 219, 0.2);
    }

    .card-preview {
      height: 200px;
      background: linear-gradient(45deg, #2c3e50, #3498db);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .card-preview::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: inherit;
      filter: blur(0);
      transition: filter 0.3s;
    }

    .card:hover .card-preview::before {
      filter: blur(2px);
    }

    .card-preview .icon {
      font-size: 4rem;
      z-index: 1;
      opacity: 0.8;
    }

    .card-preview .play-btn {
      position: absolute;
      width: 60px;
      height: 60px;
      background: rgba(52, 152, 219, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.3s ease;
    }

    .card:hover .play-btn {
      opacity: 1;
      transform: scale(1);
    }

    .play-btn::after {
      content: '';
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 10px 0 10px 18px;
      border-color: transparent transparent transparent white;
      margin-left: 4px;
    }

    .card-content {
      padding: 24px;
    }

    .card-number {
      font-size: 0.75rem;
      color: #3498db;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .card-description {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      padding: 4px 12px;
      background: rgba(52, 152, 219, 0.2);
      border-radius: 20px;
      font-size: 0.75rem;
      color: #3498db;
    }

    /* Modal for iframe */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      padding: 20px;
    }

    .modal.active {
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px 8px 0 0;
    }

    .modal-title {
      font-size: 1.2rem;
      font-weight: 500;
    }

    .modal-close {
      background: none;
      border: none;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      padding: 0 10px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .modal-close:hover {
      opacity: 1;
    }

    .modal-content {
      flex: 1;
      background: #000;
      border-radius: 0 0 8px 8px;
      overflow: hidden;
    }

    .modal-content iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    .modal-content iframe.loaded {
      background: transparent;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: rgba(255, 255, 255, 0.5);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Card-specific gradients */
    .card[data-chapter="01"] .card-preview { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .card[data-chapter="02"] .card-preview { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .card[data-chapter="03"] .card-preview { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .card[data-chapter="04"] .card-preview { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
    .card[data-chapter="05"] .card-preview { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
    .card[data-chapter="06"] .card-preview { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
    .card[data-chapter="07"] .card-preview { background: linear-gradient(135deg, #5ee7df 0%, #b490ca 100%); }
    .card[data-chapter="08"] .card-preview { background: linear-gradient(135deg, #d299c2 0%, #fef9d7 100%); }
    .card[data-chapter="09"] .card-preview { background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%); }

    footer {
      text-align: center;
      padding: 40px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.9rem;
    }

    footer a {
      color: #3498db;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Visualization <span>Workshop</span></h1>
    <p class="subtitle">Interactive examples showcasing deck.gl, Three.js, and GPU graphics techniques</p>
  </header>

  <div class="gallery" id="gallery"></div>

  <footer>
    <p>Built with deck.gl & Three.js | <a href="https://deck.gl" target="_blank">deck.gl Documentation</a></p>
  </footer>

  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Chapter</span>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-content" id="modalContent">
      <div class="loading">
        <div class="spinner"></div>
        <span>Loading...</span>
      </div>
    </div>
  </div>

  <script type="module">
    // Chapter configurations
    const chapters = [
      {
        id: '01',
        folder: '01-basics',
        port: 3001,
        title: 'Deck.gl Basics',
        description: 'Introduction to deck.gl with a ScatterplotLayer. Learn the fundamentals of setting up a visualization with React and deck.gl.',
        icon: '🎯',
        tags: ['deck.gl', 'React', 'ScatterplotLayer']
      },
      {
        id: '02',
        folder: '02-layers',
        port: 3002,
        title: 'Built-in Layers',
        description: 'Explore deck.gl\'s powerful built-in layers including GeoJson, Arc, Path, and Text layers in an interactive playground.',
        icon: '🗺️',
        tags: ['Layers', 'GeoJSON', 'ArcLayer']
      },
      {
        id: '03',
        folder: '03-extensions',
        port: 3003,
        title: 'Extensions',
        description: 'Discover deck.gl extensions like DataFilter, Clip, Mask, and Terrain for advanced data visualization capabilities.',
        icon: '🔧',
        tags: ['Extensions', 'Filtering', 'Masking']
      },
      {
        id: '04',
        folder: '04-shader-injection',
        port: 3004,
        title: 'Shader Injection',
        description: 'Learn to inject custom GLSL code into deck.gl shaders for animations, color effects, and dynamic visuals.',
        icon: '✨',
        tags: ['GLSL', 'Shaders', 'Animation']
      },
      {
        id: '05',
        folder: '05-custom-layer',
        port: 3005,
        title: 'Custom Layer',
        description: 'Build a custom deck.gl layer from scratch with custom vertex and fragment shaders for instanced rendering.',
        icon: '🎨',
        tags: ['Custom Layer', 'WebGL', 'Instancing']
      },
      {
        id: '06',
        folder: '06-nyc-taxi',
        port: 3006,
        title: 'NYC Taxi Animation',
        description: 'Animate a 3D taxi model along NYC streets using deck.gl\'s SimpleMeshLayer with real coordinate data.',
        icon: '🚕',
        tags: ['3D Models', 'Animation', 'GLTF']
      },
      {
        id: '07',
        folder: '07-celestial-threejs',
        port: 3008,
        title: 'Celestial Bodies',
        description: 'Render detailed celestial bodies with Three.js using displacement maps, bump maps, and dynamic lighting.',
        icon: '🌙',
        tags: ['Three.js', 'Textures', 'Displacement']
      },
      {
        id: '08',
        folder: '08-solar-system',
        port: 3009,
        title: 'Solar System',
        description: 'A complete solar system simulation with orbiting planets, moons, and an interactive detail panel.',
        icon: '🪐',
        tags: ['Three.js', 'Orbits', 'Physics']
      },
      {
        id: '09',
        folder: '09-particles',
        port: 3010,
        title: 'GPU Particles',
        description: 'GPU-accelerated particle advection using framebuffer ping-pong, curl noise, and procedural velocity fields.',
        icon: '🌊',
        tags: ['Particles', 'GPU', 'Shaders']
      }
    ];

    // Track running servers
    const runningServers = new Set();

    // Render gallery
    const gallery = document.getElementById('gallery');

    chapters.forEach(chapter => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.chapter = chapter.id;

      card.innerHTML = `
        <div class="card-preview">
          <span class="icon">${chapter.icon}</span>
          <div class="play-btn"></div>
        </div>
        <div class="card-content">
          <div class="card-number">CHAPTER ${chapter.id}</div>
          <h3 class="card-title">${chapter.title}</h3>
          <p class="card-description">${chapter.description}</p>
          <div class="card-tags">
            ${chapter.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
          </div>
        </div>
      `;

      card.addEventListener('click', () => openChapter(chapter));
      gallery.appendChild(card);
    });

    // Modal handling
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalContent = document.getElementById('modalContent');
    const modalClose = document.getElementById('modalClose');

    let currentIframe = null;

    function openChapter(chapter) {
      modalTitle.textContent = `Chapter ${chapter.id}: ${chapter.title}`;

      // Show loading state
      modalContent.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <span>Loading ${chapter.title}...</span>
        </div>
      `;

      modal.classList.add('active');

      // Load iframe
      const iframe = document.createElement('iframe');
      iframe.src = `http://localhost:${chapter.port}/`;

      let loaded = false;

      iframe.onload = () => {
        if (!loaded) {
          loaded = true;
          modalContent.innerHTML = '';
          modalContent.appendChild(iframe);
          iframe.classList.add('loaded');
          currentIframe = iframe;
        }
      };

      iframe.onerror = () => {
        modalContent.innerHTML = `
          <div class="loading">
            <span>Failed to load. Make sure the dev server is running:<br><br>
            <code style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 4px;">
              cd ${chapter.folder} && npm run dev
            </code></span>
          </div>
        `;
      };

      // Set a timeout in case the server isn't running
      setTimeout(() => {
        if (modalContent.querySelector('.loading .spinner')) {
          modalContent.innerHTML = `
            <div class="loading" style="flex-direction: column; text-align: center;">
              <span style="margin-bottom: 20px;">Server might not be running. Start it with:</span>
              <code style="background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 4px; font-size: 1rem;">
                cd ${chapter.folder} && npm run dev
              </code>
              <span style="margin-top: 20px; opacity: 0.6;">Then click this card again</span>
            </div>
          `;
        }
      }, 5000);

      modalContent.appendChild(iframe);
    }

    function closeModal() {
      modal.classList.remove('active');
      modalContent.innerHTML = '';
    }

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
