name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Build all chapters
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # Build each chapter
          CHAPTERS=(
            "01-basics"
            "02-layers"
            "03-extensions"
            "04-shader-injection"
            "05-custom-layer"
            "06-nyc-taxi"
            "07-celestial-threejs"
            "08-solar-system"
            "09-particles"
          )

          mkdir -p dist

          for folder in "${CHAPTERS[@]}"; do
            if [ -d "$folder" ]; then
              echo "Building $folder..."
              cd "$folder"
              npm ci
              npm run build -- --base="/${REPO_NAME}/$folder/"
              mkdir -p ../dist/$folder
              cp -r dist/* ../dist/$folder/
              cd ..
            fi
          done

          # Build gallery with matching base path so import.meta.env.BASE_URL resolves correctly
          echo "Building gallery..."
          cd 00-gallery
          npm ci
          npm run build -- --base="/${REPO_NAME}/"
          cp -r dist/* ../dist/
          cd ..

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
